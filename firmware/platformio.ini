[env:adafruit_matrixportal_esp32s3]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
test_framework = unity
test_build_src = true
monitor_speed = 115200
; Merged-OTA 4MB app partition (see partitions_custom.csv): the WS4 40x30 logo
; blob grew the image past the stock 2MB app slot. Keeps the TinyUF2 + ffat
; partitions so UF2 drag-drop still works.
board_build.partitions = partitions_custom.csv
board_build.embed_files =
    assets/airline_logos.bin

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit Protomatter
    bblanchon/ArduinoJson @ ^7.4.2

lib_ldf_mode = deep+

build_src_filter =
    +<*.cpp>
    +<**/*.cpp>
    +<../adapters/*.cpp>
    +<../assets/*.cpp>
    +<../core/*.cpp>

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=1024
    -I .
    -I include
    -I src
    -I adapters
    -I assets
    -I core
    -I models
    -I interfaces
    -I config